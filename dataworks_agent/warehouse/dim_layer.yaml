# DIM 层数仓规范配置
# 类型映射、主题域、更新方式、数据引用规则等通用配置见 common.yaml
version: 1
layer: DIM

basic:
  name_cn: "DIM 层"
  name_en: "Dimension"
  description: "公共维度层，建立企业一致性维度，降低计算口径和算法不统一的风险。"

naming:
  table_prefix: "dim_"
  table_name_pattern: "dim_{subject_domain}_{table_description}_{update_mode}"
  naming_examples:
    - "dim_pub_column_dictionary_static — 公共域-字段词根字典-静态"
    - "dim_gds_product_info_all — 商品域-产品信息-全量"
    - "dim_ord_oms_platform_all — 交易域-OMS 平台-全量"

partitions:
  required:
    - name: "dt"
      type: "STRING"
      comment: "业务日期分区，格式 yyyy-MM-dd"
  usage:
    - id: "where_dt"
      desc: "查询/写入必须带 dt 过滤条件"

columns:
  naming_rules:
    - id: "standardized_names"
      desc: "字段名应标准化，优先使用词根字典中的标准词根"
  null_handling:
    - type: "字符类型"
      rule: "空值默认填充 '-'"
    - type: "ID 字段"
      rule: "保留 NULL，不做填充"
    - type: "日期类型"
      rule: "空值默认填充 '1970-01-01'"

data_loading:
  - id: "insert_overwrite"
    desc: "写入采用 INSERT OVERWRITE 按分区重算"
  - id: "no_view"
    desc: "禁止创建视图"

storage:
  lifecycle: "永久保存"

rules:
  - id: "unique_prefix"
    level: "error"
    desc: "所有表必须以 dim_ 前缀命名"
  - id: "subject_domain_required"
    level: "error"
    desc: "表名必须包含主题域编码"
  - id: "no_view"
    level: "error"
    desc: "禁止创建视图"
