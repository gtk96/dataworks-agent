name: Security

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Scan the working tree, not a commit range. Unrelated-history / orphan
      # merges make gitleaks-action's default `base^..head` range invalid
      # (orphan commits have no parent), which fails the job without scanning.
      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: "8.24.3"
        run: |
          set -euo pipefail
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run gitleaks on working tree
        run: gitleaks detect --source . --no-git --redact -v --exit-code=1

  pre-commit:
    name: Pre-commit hooks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          cache-python: true

      - name: Install Python deps
        run: uv sync --dev

      - name: Install pre-commit
        run: uv run pre-commit install --install-hooks

      - name: Run pre-commit on all files
        run: uv run pre-commit run --all-files --show-diff-on-failure
